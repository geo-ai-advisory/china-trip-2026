<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Доступ закрыт</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f6fa;font-family:'Inter','Helvetica Neue',Arial,sans-serif;color:#2d3436}
.lock{background:#fff;border:1px solid #e0e0e0;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:40px 36px;width:100%;max-width:400px;text-align:center}
h1{margin:0 0 8px;font-size:22px;font-weight:600;color:#2d3436}
p.hint{margin:0 0 24px;font-size:14px;color:#636e72}
input{width:100%;padding:12px 14px;border:1px solid #dfe6e9;border-radius:8px;background:#f8f9fa;color:#2d3436;font-size:16px;font-family:inherit;transition:border-color .15s ease;margin-bottom:14px}
input:focus{outline:none;border-color:#0984e3}
button{width:100%;padding:12px 14px;border:0;border-radius:8px;background:#0984e3;color:#fff;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s ease,transform .05s ease,box-shadow .15s ease}
button:hover{background:#0770c2;box-shadow:0 4px 12px rgba(9,132,227,.25)}
button:active{background:#055a9c;transform:translateY(1px);box-shadow:inset 0 2px 4px rgba(0,0,0,.12)}
.err{margin-top:14px;color:#d63031;font-size:14px;min-height:20px}
</style>
</head>
<body>
<div class="lock">
<h1>Доступ закрыт</h1>
<p class="hint">Введите пароль для просмотра</p>
<form id="f" autocomplete="off">
<input type="password" id="pw" placeholder="Пароль" autofocus>
<button type="submit">Открыть</button>
<div class="err" id="err"></div>
</form>
</div>

function b64d(s){const bin=atob(s);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function tryDecrypt(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(SALT),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(IV)},key,b64d(CT));
  return new TextDecoder().decode(pt);
}
document.getElementById('f').addEventListener('submit',async e=>{
  e.preventDefault();
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err');
  err.textContent='';
  try{
    const html=await tryDecrypt(pw);
    document.open();
    document.write(html);
    document.close();
  }catch(ex){
    err.textContent='Неверный пароль';
  }
});
